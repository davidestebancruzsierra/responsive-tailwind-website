<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Demo</title>

    <!-- Link to your CSS file -->
    <!-- This connects the HTML with your custom styles -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Navigation bar -->
    <!-- This is the top section of the website -->
    <nav class="navbar">
        <h1 class="logo">Mi Página</h1>
        <ul class="nav-links">
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Acerca</a></li>
            <li><a href="#">Contacto</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <!-- Big banner area with main message -->
    <header class="hero">
        <h2>Bienvenido a mi web</h2>
        <p>Esta es una demo para que no jodas más 😊</p>
        <button class="btn">Saber más</button>

    <!-- Content Section -->
    <!-- Main content cards -->
    <section class="content">
        <div class="card">
            <h3>Título 1</h3>
            <p>Texto de ejemplo para la tarjeta 1.</p>
        </div>

        <div class="card">
            <h3>Título 2</h3>
            <p>Texto de ejemplo para la tarjeta 2.</p>
        </div>

        <div class="card">
            <h3>Título 3</h3>
            <p>Texto de ejemplo para la tarjeta 3.</p>

    </section>

    <!-- Footer -->
    <!-- Bottom part of the website -->
    <footer class="footer">
        <p>© 2025 — Sebas rules</p>
    </footer>

</html>
